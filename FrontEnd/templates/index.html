<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Clasificador de fósiles</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <link rel="stylesheet" href="/static/css/estilos.css">
</head>
<body>

<div class="container py-4">
  <h1 class="titulo text-center mb-3">Clasificador de fósiles</h1>
  <p class="descripcion text-center mb-4">
    Sube una imagen de un fósil del cual quieras conocer la información sobre su linaje, características o tiempo que vivió en la tierra.
  </p>

  <div class="card p-3 shadow-sm text-center">
    <div class="row g-2 align-items-center">
      <div class="col-md-8">
        <input type="file" id="archivoCargado" class="form-control" accept=".jpg,.jpeg,.png,image/jpeg,image/png">
      </div>
      <div class="col-md-4">
        <button id="botonPrediccion" class="btn btn-prediccion w-100">
          Realizar predicción
        </button>
      </div>
    </div>
  </div>

  <div id="resultado" class="mt-4"></div>

</div>

<script src="/static/js/script.js"></script>
</body>
</html>
